<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AuraBank — Secure online banking login portal">
  <title>AuraBank — Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="login-wrapper fade-in">
    <div class="login-card fade-in-up">
      <div class="login-logo">
        <div class="logo-icon"><i class="bi bi-bank"></i></div>
        <h1>AuraBank</h1>
      </div>
      <p class="login-subtitle">Sign in to your account to continue</p>

      <div class="test-mode-bar">
        <label for="toggle-test-mode"><i class="bi bi-bug"></i> Test Mode</label>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="toggle-test-mode" data-testid="toggle-test-mode">
        </div>
      </div>

      <div class="login-error" id="login-error"></div>

      <form id="form-login" autocomplete="off">
        <div class="mb-3">
          <label class="form-label-custom" for="input-username">Username</label>
          <input type="text" class="form-control form-control-custom" id="input-username" data-testid="input-username" placeholder="Enter your username" required>
        </div>
        <div class="mb-4">
          <label class="form-label-custom" for="input-password">Password</label>
          <div class="position-relative">
            <input type="password" class="form-control form-control-custom" id="input-password" data-testid="input-password" placeholder="Enter your password" required>
            <button type="button" id="btn-toggle-password" class="btn position-absolute end-0 top-50 translate-middle-y me-1" style="z-index:5; color: var(--text-muted);"><i class="bi bi-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="btn-primary-custom" id="btn-login" data-testid="btn-login">
          <span id="login-btn-text">Sign In</span>
          <span id="login-btn-spinner" class="d-none"><span class="spinner-border spinner-border-sm me-2"></span>Signing in...</span>
        </button>
      </form>

      <div class="text-center mt-3">
        <small style="color: var(--text-muted); font-size: 12px;">Protected by 256-bit encryption</small>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const toggleTestMode = document.getElementById('toggle-test-mode');
    const inputUsername = document.getElementById('input-username');
    const inputPassword = document.getElementById('input-password');
    const formLogin = document.getElementById('form-login');
    const loginError = document.getElementById('login-error');
    const btnTogglePassword = document.getElementById('btn-toggle-password');

    toggleTestMode.addEventListener('change', function() {
      if (this.checked) {
        inputUsername.value = 'john.doe';
        inputPassword.value = 'Pass@123';
      } else {
        inputUsername.value = '';
        inputPassword.value = '';
      }
    });

    btnTogglePassword.addEventListener('click', function() {
      const type = inputPassword.type === 'password' ? 'text' : 'password';
      inputPassword.type = type;
      this.querySelector('i').className = type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
    });

    formLogin.addEventListener('submit', async function(e) {
      e.preventDefault();
      loginError.style.display = 'none';
      document.getElementById('login-btn-text').classList.add('d-none');
      document.getElementById('login-btn-spinner').classList.remove('d-none');

      try {
        const data = await apiFetch('/api/login', {
          method: 'POST',
          body: JSON.stringify({
            username: inputUsername.value.trim(),
            password: inputPassword.value
          })
        });
        setSession(data);
        showSuccess('Login successful! Redirecting...');
        setTimeout(() => { window.location.href = '/dashboard.html'; }, 800);
      } catch (err) {
        loginError.textContent = err.message || 'Invalid username or password';
        loginError.style.display = 'block';
        showError(err.message || 'Login failed');
        document.getElementById('login-btn-text').classList.remove('d-none');
        document.getElementById('login-btn-spinner').classList.add('d-none');
      }
    });

    if (getSession()) window.location.href = '/dashboard.html';
  </script>
</body>
</html>
